name: Build and Release Package

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Compute release metadata
        id: versioning
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          BUILD_NUMBER=${GITHUB_RUN_NUMBER}
          RELEASE_VERSION="${BASE_VERSION}-${BUILD_NUMBER}"
          PUBLISH_VERSION="${BASE_VERSION}-${BUILD_NUMBER}"
          echo "BASE_VERSION=$BASE_VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
          echo "PUBLISH_VERSION=$PUBLISH_VERSION" >> $GITHUB_ENV
          echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "publish_version=$PUBLISH_VERSION" >> $GITHUB_OUTPUT

      - name: Apply publish version
        run: |
          node <<'EOF'
          const fs = require('fs');
          const version = process.env.PUBLISH_VERSION;
          if (!version) {
            throw new Error('PUBLISH_VERSION is not defined');
          }
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = version;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          if (fs.existsSync('package-lock.json')) {
            const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
            lock.version = version;
            if (lock.packages && lock.packages['']) {
              lock.packages[''].version = version;
            }
            fs.writeFileSync('package-lock.json', JSON.stringify(lock, null, 2) + '\n');
          }
          EOF
        env:
          PUBLISH_VERSION: ${{ steps.versioning.outputs.publish_version }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test --if-present

      - name: Build project
        run: npm run build

      - name: Create npm package tarball
        id: pack
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PACK_RESULT=$(npm pack --json)
          PACKAGE_TARBALL=$(node -e "const data=JSON.parse(process.argv[1]); if(!data.length) throw new Error('npm pack produced no files'); console.log(data[0].filename);" "$PACK_RESULT")
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV
          echo "PACKAGE_TARBALL=$PACKAGE_TARBALL" >> $GITHUB_ENV
          echo "tarball=$PACKAGE_TARBALL" >> $GITHUB_OUTPUT
          echo "name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT

      - name: Configure npm auth for GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${GITHUB_TOKEN}" > ~/.npmrc
          SCOPE=$(node -e "const name=require('./package.json').name; if(name.startsWith('@')){process.stdout.write(name.split('/')[0]);}")
          if [ -n "$SCOPE" ]; then
            echo "$SCOPE:registry=https://npm.pkg.github.com" >> ~/.npmrc
          else
            echo "registry=https://npm.pkg.github.com" >> ~/.npmrc
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        run: npm publish --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.versioning.outputs.release_version }}
          release_name: ${{ steps.versioning.outputs.release_version }}
          body: |
            Automated release generated from commit ${{ github.sha }}.
          draft: false
          prerelease: false

      - name: Upload package tarball
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ steps.pack.outputs.tarball }}
          asset_name: ${{ steps.pack.outputs.tarball }}
          asset_content_type: application/gzip
