name: Build and Release Package

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test --if-present

      - name: Build project
        run: npm run build

      - name: Create npm package tarball
        id: pack
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV
          npm pack
          echo "PACKAGE_TARBALL=${PACKAGE_NAME}-${PACKAGE_VERSION}.tgz" >> $GITHUB_ENV
          echo "tarball=${PACKAGE_NAME}-${PACKAGE_VERSION}.tgz" >> $GITHUB_OUTPUT
          echo "name=${PACKAGE_NAME}" >> $GITHUB_OUTPUT
          echo "version=${PACKAGE_VERSION}" >> $GITHUB_OUTPUT

      - name: Configure npm auth for GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${GITHUB_TOKEN}" > ~/.npmrc
          SCOPE=$(node -e "const name=require('./package.json').name; if(name.startsWith('@')){process.stdout.write(name.split('/')[0]);}")
          if [ -n "$SCOPE" ]; then
            echo "$SCOPE:registry=https://npm.pkg.github.com" >> ~/.npmrc
          else
            echo "registry=https://npm.pkg.github.com" >> ~/.npmrc
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        run: npm publish --access public --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: release-${{ github.sha }}
          release_name: Release ${{ steps.pack.outputs.version }} · build ${{ github.run_number }}
          body: |
            Automated release generated from commit ${{ github.sha }}.
            - Package name: `${{ steps.pack.outputs.name }}`
            - Version: `${{ steps.pack.outputs.version }}`
            - Workflow run: `${{ github.run_id }}`
          draft: false
          prerelease: false

      - name: Upload package tarball
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ steps.pack.outputs.tarball }}
          asset_name: ${{ steps.pack.outputs.tarball }}
          asset_content_type: application/gzip
