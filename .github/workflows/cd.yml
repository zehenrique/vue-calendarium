name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create GitHub releases
      id-token: write  # needed for npm provenance
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Check if version already published
        id: version_check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if npm view vue-calendarium@$VERSION version 2>/dev/null | grep -q "$VERSION"; then
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        if: steps.version_check.outputs.already_published == 'false'
        run: npm run test --if-present

      - name: Publish to npm
        if: steps.version_check.outputs.already_published == 'false'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: steps.version_check.outputs.already_published == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version_check.outputs.version }}
          name: v${{ steps.version_check.outputs.version }}
          generate_release_notes: true
